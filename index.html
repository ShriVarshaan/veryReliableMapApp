<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliableMaps | Precisely Accurate-ish</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <aside class="controls">
            <h1>🗺️ ReliableMaps</h1>
            <p class="tagline">Precisely accurate-ish.</p>
            
            <div class="search-box">
                <input type="text" id="destination" placeholder="Where do you want to go?">
                <button id="search-btn">Navigate</button>
            </div>

            <div id="status-panel" class="hidden">
                <div class="route-info">
                    <span class="label">Destination:</span>
                    <span id="display-dest">--</span>
                </div>
                <div class="accuracy-badge">99.9% Accurate*</div>
                <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">*Margin of error: 1km</p>
            </div>
        </aside>

        <section id="map-viewport">
            <div id="map" style="height: 100%; width: 100%;"></div>
            
            <div id="user-marker" class="marker"></div>
            <div id="target-marker" class="marker target hidden" style="pointer-events: none;"></div>
            <div id="grid-overlay" style="pointer-events: none;"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="sabotage.js"></script>
    <script src="api.js"></script>
    
    <script src="app.js"></script>

    <script>
        // Quick fail-safe for the Enter key
        document.getElementById('destination').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleNavigation();
        });
    </script>
</body>
</html>
